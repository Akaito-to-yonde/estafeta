<div class="flex h-screen bg-gray-100">
  <!-- Sidebar -->
  <nav
    class="flex flex-col w-56 bg-white border-r border-gray-200 shadow-sm"
    aria-label="Admin navigation"
  >
    <!-- Brand -->
    <div class="px-4 py-5 border-b border-gray-200">
      <span class="text-lg font-semibold text-gray-800">Admin</span>
    </div>

    <!-- Nav links -->
    <ul class="flex-1 px-2 py-4 space-y-1" role="list">
      <li>
        <a
          routerLink="/admin/users"
          routerLinkActive="bg-blue-50 text-blue-700 font-medium"
          [routerLinkActiveOptions]="{ exact: false }"
          class="flex items-center gap-3 px-3 py-2 rounded-md text-sm text-gray-700 hover:bg-gray-100 transition-colors"
          aria-current="page"
        >
          <i class="pi pi-users text-base" aria-hidden="true"></i>
          <span>{{ labels.users }}</span>
        </a>
      </li>
    </ul>

    <!-- Sign out -->
    <div class="px-2 py-4 border-t border-gray-200">
      <button
        type="button"
        (click)="onSignOut()"
        class="flex items-center gap-3 w-full px-3 py-2 rounded-md text-sm text-gray-700 hover:bg-gray-100 transition-colors"
      >
        <i class="pi pi-sign-out text-base" aria-hidden="true"></i>
        <span>{{ labels.logout }}</span>
      </button>
    </div>
  </nav>

  <!-- Main content -->
  <main class="flex-1 overflow-auto p-6">
    <router-outlet />
  </main>
</div>
