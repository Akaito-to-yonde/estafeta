<div class="flex h-screen bg-slate-50">

  <!-- Sidebar -->
  <nav
    class="flex flex-col w-60 bg-white border-r border-brand-100 shadow-sm shrink-0"
    aria-label="Administración"
  >
    <!-- Brand -->
    <a
      routerLink="/"
      class="flex items-center gap-3 px-5 py-5 border-b border-brand-100 group"
      aria-label="Estafeta — Inicio"
    >
      <svg
        viewBox="0 0 40 40"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
        class="w-8 h-8 shrink-0"
        aria-hidden="true"
      >
        <circle cx="20" cy="20" r="20" class="fill-brand-600" />
        <rect x="10" y="10" width="20" height="4" rx="2" fill="white" />
        <rect x="10" y="18" width="12" height="4" rx="2" fill="white" />
        <path d="M22 18 L30 20 L22 22 Z" fill="white" />
        <rect x="10" y="26" width="20" height="4" rx="2" fill="white" />
      </svg>
      <div>
        <span class="block text-sm font-bold text-slate-900 group-hover:text-brand-600 transition-colors duration-150">
          Estafeta
        </span>
        <span class="block text-xs text-slate-400">Administración</span>
      </div>
    </a>

    <!-- Nav links -->
    <ul class="flex-1 px-3 py-4 space-y-1">
      <li>
        <a
          routerLink="/admin/users"
          routerLinkActive="bg-brand-50 text-brand-700 font-semibold"
          [routerLinkActiveOptions]="{ exact: false }"
          class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-slate-600 hover:bg-brand-50 hover:text-brand-700 transition-colors duration-150"
        >
          <i class="pi pi-users text-base" aria-hidden="true"></i>
          <span>{{ labels.users }}</span>
        </a>
      </li>
    </ul>

    <!-- Sign out -->
    <div class="px-3 py-4 border-t border-brand-100">
      <button
        type="button"
        (click)="onSignOut()"
        class="flex items-center gap-3 w-full px-3 py-2.5 rounded-lg text-sm text-slate-600 hover:bg-brand-50 hover:text-brand-700 transition-colors duration-150 cursor-pointer"
      >
        <i class="pi pi-sign-out text-base" aria-hidden="true"></i>
        <span>{{ labels.logout }}</span>
      </button>
    </div>
  </nav>

  <!-- Main content -->
  <main class="flex-1 overflow-auto p-6">
    <router-outlet />
  </main>

</div>
