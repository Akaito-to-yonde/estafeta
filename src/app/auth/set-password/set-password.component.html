<div class="w-full max-w-md bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
  <h1 id="set-password-title" class="text-2xl font-bold text-slate-900 mb-8">
    {{ strings.auth.setPasswordTitle }}
  </h1>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate class="flex flex-col gap-5">
    <div class="flex flex-col gap-1.5">
      <label for="password" class="text-sm font-medium text-slate-700">{{
        strings.auth.passwordLabel
      }}</label>
      <input
        id="password"
        type="password"
        pInputText
        class="w-full"
        formControlName="password"
        autocomplete="new-password"
        [attr.aria-describedby]="password.invalid && password.touched ? 'password-error' : null"
        [attr.aria-invalid]="password.invalid && password.touched ? 'true' : null"
      />
      @if (password.touched && password.hasError('minlength')) {
        <small id="password-error" class="text-xs text-red-500" role="alert">
          {{ strings.auth.passwordMinLength }}
        </small>
      }
    </div>

    <div class="flex flex-col gap-1.5">
      <label for="passwordConfirmation" class="text-sm font-medium text-slate-700">{{
        strings.auth.passwordLabel2
      }}</label>
      <input
        id="passwordConfirmation"
        type="password"
        pInputText
        class="w-full"
        formControlName="passwordConfirmation"
        autocomplete="new-password"
        [attr.aria-describedby]="
          passwordConfirmation.touched && form.hasError('passwordMismatch') ? 'confirm-error' : null
        "
        [attr.aria-invalid]="
          passwordConfirmation.touched && form.hasError('passwordMismatch') ? 'true' : null
        "
      />
      @if (passwordConfirmation.touched && form.hasError('passwordMismatch')) {
        <small id="confirm-error" class="text-xs text-red-500" role="alert">
          {{ strings.auth.passwordMismatch }}
        </small>
      }
    </div>

    @if (errorMessage()) {
      <div class="bg-red-50 border border-red-200 text-red-700 rounded-xl px-4 py-3" role="alert">
        {{ errorMessage() }}
      </div>
    }

    <p-button
      type="submit"
      styleClass="w-full"
      [label]="isLoading() ? strings.common.loading : strings.auth.setPasswordButton"
      [disabled]="isLoading()"
      [loading]="isLoading()"
    />
  </form>
</div>
