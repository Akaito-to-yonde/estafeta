<section class="set-password-page" aria-labelledby="set-password-title">
  <h1 id="set-password-title">{{ strings.auth.setPasswordTitle }}</h1>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
    <div class="field">
      <label for="password">{{ strings.auth.passwordLabel }}</label>
      <input
        id="password"
        type="password"
        formControlName="password"
        autocomplete="new-password"
        [attr.aria-describedby]="password.invalid && password.touched ? 'password-error' : null"
        [attr.aria-invalid]="password.invalid && password.touched ? 'true' : null"
      />
      @if (password.touched && password.hasError('minlength')) {
        <small id="password-error" class="field-error" role="alert">
          {{ strings.auth.passwordMinLength }}
        </small>
      }
    </div>

    <div class="field">
      <label for="passwordConfirmation">{{ strings.auth.passwordLabel2 }}</label>
      <input
        id="passwordConfirmation"
        type="password"
        formControlName="passwordConfirmation"
        autocomplete="new-password"
        [attr.aria-describedby]="
          passwordConfirmation.touched && form.hasError('passwordMismatch')
            ? 'confirm-error'
            : null
        "
        [attr.aria-invalid]="
          passwordConfirmation.touched && form.hasError('passwordMismatch') ? 'true' : null
        "
      />
      @if (passwordConfirmation.touched && form.hasError('passwordMismatch')) {
        <small id="confirm-error" class="field-error" role="alert">
          {{ strings.auth.passwordMismatch }}
        </small>
      }
    </div>

    @if (errorMessage()) {
      <p class="server-error" role="alert">{{ errorMessage() }}</p>
    }

    <button type="submit" [disabled]="isLoading()">
      @if (isLoading()) {
        {{ strings.common.loading }}
      } @else {
        {{ strings.auth.setPasswordButton }}
      }
    </button>
  </form>
</section>
