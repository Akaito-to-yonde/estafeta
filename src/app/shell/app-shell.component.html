<div class="min-h-screen flex flex-col bg-slate-100">
  <!-- Header -->
  <header class="bg-white border-b border-brand-100 shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <!-- Logo -->
        <a routerLink="/" class="flex items-center gap-3 group" aria-label="Estafeta — Inicio">
          <svg
            viewBox="0 0 40 40"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            class="w-9 h-9 shrink-0"
            aria-hidden="true"
          >
            <circle cx="20" cy="20" r="20" class="fill-brand-600" />
            <rect x="10" y="10" width="20" height="4" rx="2" fill="white" />
            <rect x="10" y="18" width="12" height="4" rx="2" fill="white" />
            <path d="M22 18 L30 20 L22 22 Z" fill="white" />
            <rect x="10" y="26" width="20" height="4" rx="2" fill="white" />
          </svg>
          <span
            class="text-xl font-bold text-slate-900 tracking-tight group-hover:text-brand-600 transition-colors duration-150"
          >
            Estafeta
          </span>
        </a>

        <!-- Navigation -->
        <nav class="hidden sm:flex items-center gap-1" aria-label="Navegación principal">
          <a
            routerLink="/conferences"
            routerLinkActive="text-brand-700 bg-brand-50 font-semibold"
            [routerLinkActiveOptions]="{ exact: false }"
            class="px-4 py-2 rounded-lg text-sm text-slate-600 hover:text-brand-700 hover:bg-brand-50 transition-colors duration-150"
          >
            Conferencias
          </a>

          @if (isAuthenticated()) {
            <a
              routerLink="/meetings"
              routerLinkActive="text-brand-700 bg-brand-50 font-semibold"
              [routerLinkActiveOptions]="{ exact: false }"
              class="px-4 py-2 rounded-lg text-sm text-slate-600 hover:text-brand-700 hover:bg-brand-50 transition-colors duration-150"
            >
              Reuniones
            </a>
            <a
              routerLink="/calendar"
              routerLinkActive="text-brand-700 bg-brand-50 font-semibold"
              class="px-4 py-2 rounded-lg text-sm text-slate-600 hover:text-brand-700 hover:bg-brand-50 transition-colors duration-150"
            >
              Calendario
            </a>
          }

          @if (isAdmin()) {
            <a
              routerLink="/admin/users"
              routerLinkActive="text-brand-700 bg-brand-50 font-semibold"
              [routerLinkActiveOptions]="{ exact: false }"
              class="px-4 py-2 rounded-lg text-sm text-slate-600 hover:text-brand-700 hover:bg-brand-50 transition-colors duration-150"
            >
              Administración
            </a>
          }
        </nav>

        <!-- Auth actions -->
        <div class="flex items-center gap-2">
          @if (isAuthenticated()) {
            <span class="hidden sm:block text-xs text-slate-500 max-w-40 truncate">
              {{ userEmail() }}
            </span>
            <button
              type="button"
              (click)="onSignOut()"
              class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm text-slate-600 hover:text-brand-700 hover:bg-brand-50 transition-colors duration-150 cursor-pointer"
            >
              <i class="pi pi-sign-out text-sm" aria-hidden="true"></i>
              <span class="hidden sm:inline">Salir</span>
            </button>
          } @else {
            <a
              routerLink="/auth/login"
              class="px-4 py-2 rounded-lg text-sm font-medium text-brand-600 hover:text-brand-700 hover:bg-brand-50 transition-colors duration-150"
            >
              Ingresar
            </a>
            <a
              routerLink="/auth/register"
              class="px-4 py-2 rounded-lg text-sm font-semibold text-white bg-brand-600 hover:bg-brand-700 transition-colors duration-150 shadow-sm"
            >
              Registrarse
            </a>
          }
        </div>
      </div>
    </div>
  </header>

  <!-- Page content -->
  <main class="flex-1">
    <router-outlet />
  </main>

  <!-- Footer -->
  <footer class="bg-white border-t border-brand-100 mt-auto">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
      <div class="flex flex-col sm:flex-row items-center justify-between gap-4">
        <div class="flex items-center gap-2">
          <svg
            viewBox="0 0 40 40"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            class="w-6 h-6 shrink-0 opacity-60"
            aria-hidden="true"
          >
            <circle cx="20" cy="20" r="20" class="fill-brand-600" />
            <rect x="10" y="10" width="20" height="4" rx="2" fill="white" />
            <rect x="10" y="18" width="12" height="4" rx="2" fill="white" />
            <path d="M22 18 L30 20 L22 22 Z" fill="white" />
            <rect x="10" y="26" width="20" height="4" rx="2" fill="white" />
          </svg>
          <span class="text-sm font-semibold text-slate-500">Estafeta</span>
        </div>
        <p class="text-xs text-slate-400">Conectando empresas a través de todas las industrias.</p>
      </div>
    </div>
  </footer>
</div>
